<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f4f0; color: #1a1a18; padding: 2rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 0.25rem; }
.desc { font-size: 13px; color: #888; margin-bottom: 1rem; }

/* TOP BAR */
.top-bar { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; margin-bottom: 0.25rem; }
.country-select-wrap { display: flex; align-items: center; gap: 8px; }
.country-select-wrap label { font-size: 13px; color: #888; }
.country-select {
  padding: 6px 12px; border-radius: 999px; font-size: 13px;
  border: 1.5px solid #ccc; background: #fff; color: #1a1a18;
  cursor: pointer; outline: none;
}
.country-select:focus { border-color: #aaa; }

/* VIEW TOGGLE */
.view-toggle { display: flex; gap: 4px; background: #e8e6e0; border-radius: 999px; padding: 3px; margin-bottom: 1rem; width: fit-content; }
.view-btn {
  padding: 6px 20px; border-radius: 999px; border: none;
  font-size: 13px; font-weight: 400; cursor: pointer;
  color: #888; background: transparent; transition: all 0.2s;
}
.view-btn.active { background: #fff; color: #1a1a18; font-weight: 500; box-shadow: 0 1px 4px rgba(0,0,0,0.10); }

/* MONTH FILTER */
.month-filters {
  display: none; gap: 6px; flex-wrap: wrap;
  padding: 0 0 0.5rem; align-items: center;
}
.month-filters.visible { display: flex; }
.month-label { font-size: 12px; color: #888; margin-right: 2px; }
.month-btn {
  padding: 4px 11px; border-radius: 999px; font-size: 12px;
  border: 1.5px solid #ccc; background: #fff;
  cursor: pointer; color: #666; transition: all 0.15s;
}
.month-btn:hover { background: #f0efeb; }
.month-btn.active { background: #1a1a18; border-color: #1a1a18; color: #fff; font-weight: 500; }

/* TABS */
.tabs { display: flex; gap: 8px; flex-wrap: wrap; padding: 0.5rem 0; }
.tab-btn {
  display: flex; align-items: center; gap: 6px;
  padding: 7px 16px; border-radius: 999px;
  border: 1.5px solid #ccc; background: #fff;
  cursor: pointer; font-size: 14px; font-weight: 400;
  color: #1a1a18; transition: all 0.15s;
}
.tab-btn .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.tab-btn.active { font-weight: 500; border-width: 2px; }
.tab-btn:hover { background: #f0efeb; }
.sub-filters {
  display: none; gap: 6px; flex-wrap: wrap;
  padding: 0.5rem 0 0.75rem; align-items: center; min-height: 36px;
}
.sub-filters.visible { display: flex; }
.sub-label { font-size: 12px; color: #888; margin-right: 2px; }
.sub-btn {
  padding: 4px 12px; border-radius: 999px; font-size: 12px;
  border: 1px solid #ccc; background: #fff;
  cursor: pointer; color: #666; transition: all 0.15s;
}
.sub-btn:hover { background: #f0efeb; }
.sub-btn.active { font-weight: 500; color: #fff; }

/* PROD FILTERS */
.prod-filters {
  display: none; gap: 6px; flex-wrap: wrap;
  padding: 0 0 0.75rem; align-items: center; min-height: 36px;
}
.prod-filters.visible { display: flex; }
.prod-label { font-size: 12px; color: #888; margin-right: 2px; }
.prod-btn {
  padding: 4px 12px; border-radius: 999px; font-size: 12px;
  border: 1px solid #ccc; background: #fff;
  cursor: pointer; color: #666; transition: all 0.15s;
}
.prod-btn:hover { background: #f0efeb; }
.prod-btn.active { font-weight: 500; color: #fff; }

.subtitle { font-size: 13px; color: #888; margin: 0 0 0.5rem; }
.country-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 0.75rem; min-height: 24px; }
.country-pill { font-size: 12px; padding: 3px 10px; border-radius: 999px; font-weight: 500; color: #fff; }
.map-wrap { width: 100%; border-radius: 12px; overflow: hidden; background: #eeedea; padding: 0.25rem; }
svg#world-map { width: 100%; height: auto; display: block; }
.country { stroke: #fff; stroke-width: 0.3px; transition: opacity 0.2s; cursor: default; }
.country.clickable { cursor: pointer; }
.country.clickable:hover { opacity: 0.75; }
.tooltip {
  position: fixed; background: #fff; border: 0.5px solid #ccc;
  border-radius: 8px; padding: 6px 12px; font-size: 13px;
  pointer-events: none; display: none; z-index: 999;
  color: #1a1a18; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}
.legend { display: flex; align-items: center; gap: 16px; margin-top: 0.75rem; font-size: 12px; color: #888; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 5px; }
.legend-dot { width: 10px; height: 10px; border-radius: 50%; }

/* MODAL */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.25);
  z-index: 1000; display: none; align-items: center; justify-content: center;
}
.modal-overlay.visible { display: flex; }
.modal {
  background: #fff; border-radius: 16px; padding: 1.75rem;
  min-width: 320px; max-width: 480px; width: 90%;
  box-shadow: 0 8px 32px rgba(0,0,0,0.12); position: relative;

.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; }
.modal-title { font-size: 18px; font-weight: 600; color: #1a1a18; }
.modal-close {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: #f0efeb; cursor: pointer; font-size: 16px; color: #666;
  display: flex; align-items: center; justify-content: center; transition: background 0.15s;
}
.modal-close:hover { background: #e4e2dc; }
.modal-group { margin-bottom: 0.875rem; }
.modal-group:last-child { margin-bottom: 0; }
.modal-group-header { display: flex; align-items: center; gap: 8px; margin-bottom: 0.4rem; }
.modal-group-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.modal-group-name { font-size: 14px; font-weight: 500; color: #1a1a18; }
.modal-subs { display: flex; gap: 6px; flex-wrap: wrap; padding-left: 17px; }
.modal-sub { font-size: 12px; padding: 2px 9px; border-radius: 999px; font-weight: 500; color: #fff; }
.modal-none { font-size: 12px; color: #bbb; padding-left: 17px; font-style: italic; }
.modal-inactive .modal-group-name { color: #bbb; }
.modal-inactive .modal-group-dot { background: #E0DED8 !important; }

// ── STATE ──
let currentGroup   = 'Wood';
let currentSub     = null;
let currentProduct = null;
let currentView    = 'seo';
let currentMonth   = null;
const MONTHS_ORDER = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// ── DOM REFS ──
const tabsEl       = document.getElementById('tabs');
const subFilters   = document.getElementById('sub-filters');
const prodFilters  = document.getElementById('prod-filters');
const subtitleEl   = document.getElementById('subtitle');
const pillsEl      = document.getElementById('country-pills');
const tooltipEl    = document.getElementById('tooltip');

const legendLbl    = document.getElementById('legend-active-label');

const modalBody    = document.getElementById('modal-body');
const modalClose   = document.getElementById('modal-close');
const countrySelect= document.getElementById('country-select');
const monthFilters = document.getElementById('month-filters');

// ── DROPDOWN ──
MODAL_ENTRIES.forEach(function(e) {
  const opt = document.createElement('option');
  opt.value = e.iso; opt.textContent = e.label;
  countrySelect.appendChild(opt);
});
countrySelect.addEventListener('change', function() {
  if (this.value) { openModal(this.value); this.value = ''; }
});

// ── HELPERS ──
function solidColor(g) { return GROUPS[g].solidColor || GROUPS[g].color; }

function isCountryActive(iso3) {
  if (currentView === 'paid') {
    const c = PAID_COUNTRIES[iso3];
    if (!c) return false;
    const gdata = c.active[currentGroup];
    if (!gdata || !gdata.all) return false;
    if (currentSub) {
      const sdata = gdata.subs && gdata.subs[currentSub];
      if (!sdata || !sdata.active) return false;
      return currentMonth ? sdata.months.includes(currentMonth) : true;
    }
    return currentMonth ? gdata.months.includes(currentMonth) : true;
  }
  const c = COUNTRIES[iso3];
  if (!c) return false;
  const gdata = c.active[currentGroup];
  if (!gdata) return false;
  if (currentProduct) {
    var pushed = PUSHED_PRODUCTS[iso3];
    if (!pushed) return false;
    var gp = pushed[currentGroup]; if (!gp) return false;
    var sp = gp[currentSub]; if (!sp) return false;
    return sp.includes(currentProduct);
  }
  if (currentSub) return gdata.subs[currentSub] === true;
  return gdata.all;
}

function getActiveCountries() {
  var src = currentView === 'paid' ? PAID_COUNTRIES : COUNTRIES;
  return Object.values(src).filter(function(c) { return isCountryActive(c.iso); });
}

function isProductPushed(prod) {
  return Object.values(PUSHED_PRODUCTS).some(function(cd) {
    return Object.values(cd).some(function(ld) {
      return Object.values(ld).some(function(pl) { return pl.includes(prod); });
    });
  });
}

// ── MONTH FILTERS ──
function buildMonthFilters() {
  monthFilters.querySelectorAll('.month-btn').forEach(function(b) { b.remove(); });
  if (currentView !== 'paid') { monthFilters.classList.remove('visible'); return; }
  monthFilters.classList.add('visible');
  MONTHS_ORDER.forEach(function(m) {
    var btn = document.createElement('button');
    btn.className = 'month-btn' + (m === currentMonth ? ' active' : '');
    btn.textContent = m; btn.dataset.month = m;
    btn.addEventListener('click', function() {
      currentMonth = currentMonth === m ? null : m;
      buildMonthFilters(); updateSubtitle(); updateMap();
    });
    monthFilters.appendChild(btn);
  });
}

// ── MODAL ──
function openModal(iso3) {
  var c = currentView === 'paid' ? (PAID_COUNTRIES[iso3] || COUNTRIES[iso3]) : COUNTRIES[iso3];
  if (!c) return;
  const rl = REGION_LABEL[iso3];
  modalTitle.textContent = rl ? rl.label : c.name;
  modalBody.innerHTML = '';
  Object.keys(GROUPS).forEach(function(g) {
    const gdata = c.active[g];
    const isActive = gdata && gdata.all;
    var activeSubs = [];
    if (isActive && gdata.subs) {
      if (currentView === 'paid') {
        activeSubs = Object.entries(gdata.subs).filter(function(e) { return e[1] && e[1].active; }).map(function(e) { return e[0]; });
      } else {
        activeSubs = Object.entries(gdata.subs).filter(function(e) { return e[1] === true; }).map(function(e) { return e[0]; });
      }
    }
    const col = GROUPS[g].dotPattern ? '#888780' : GROUPS[g].dotBg;
    const div = document.createElement('div');
    div.className = 'modal-group' + (isActive ? '' : ' modal-inactive');
    const header = document.createElement('div'); header.className = 'modal-group-header';
    const dot = document.createElement('span'); dot.className = 'modal-group-dot';
    if (isActive) {
      if (GROUPS[g].dotPattern) { dot.style.cssText = 'width:9px;height:9px;border-radius:50%;background:repeating-linear-gradient(45deg,#bbb 0px,#bbb 1px,#e8e6e0 1px,#e8e6e0 3px);border:0.5px solid #999;flex-shrink:0;'; }
      else { dot.style.background = col; }
    }
    const name = document.createElement('span'); name.className = 'modal-group-name'; name.textContent = g;
    header.appendChild(dot); header.appendChild(name); div.appendChild(header);
    if (isActive) {
      if (activeSubs.length > 0) {
        const sd = document.createElement('div'); sd.className = 'modal-subs';
        activeSubs.forEach(function(s) {
          const t = document.createElement('span'); t.className = 'modal-sub'; t.style.background = col; t.textContent = s; sd.appendChild(t);
        });
        div.appendChild(sd);
      } else {
        const n = document.createElement('div'); n.className = 'modal-none'; n.textContent = 'nessuna lavorazione specifica'; div.appendChild(n);
      }
    }
    modalBody.appendChild(div);
  });
  modalOverlay.classList.add('visible');
}
function closeModal() { modalOverlay.classList.remove('visible'); }
modalClose.addEventListener('click', closeModal);
modalOverlay.addEventListener('click', function(e) { if (e.target === modalOverlay) closeModal(); });

// ── UPDATE FUNCTIONS ──
function updateSubtitle() {
  const active = getActiveCountries();
  const col = GROUPS[currentGroup].dotPattern ? '#888780' : GROUPS[currentGroup].color;
  pillsEl.innerHTML = '';
  const seenRegions = new Set(); const pills = [];
  active.forEach(function(c) {
    const rl = REGION_LABEL[c.iso];
    if (rl) { if (!seenRegions.has(rl.region)) { seenRegions.add(rl.region); pills.push(rl.label); } }
    else { pills.push(c.name); }
  });
  const n = pills.length;
  const label = currentSub ? currentGroup + ' › ' + currentSub : currentGroup;
  subtitleEl.textContent = label + ' — ' + n + (n === 1 ? ' area attiva' : ' aree attive');
  if (n === 0) {
    const e = document.createElement('span'); e.style.cssText = 'font-size:12px;color:#888;font-style:italic;'; e.textContent = 'Nessuna area selezionata'; pillsEl.appendChild(e);
  } else {
    pills.forEach(function(p) {
      const pill = document.createElement('span'); pill.className = 'country-pill'; pill.style.background = col; pill.textContent = p; pillsEl.appendChild(pill);
    });
  }
}

function updateLegend() {
  if (GROUPS[currentGroup].dotPattern) { legendDot.style.cssText = 'width:10px;height:10px;border-radius:50%;background:repeating-linear-gradient(45deg,#bbb 0px,#bbb 1px,#e8e6e0 1px,#e8e6e0 3px);border:0.5px solid #999;'; }
  else { legendDot.style.cssText = 'width:10px;height:10px;border-radius:50%;background:' + GROUPS[currentGroup].dotBg + ';'; }
  legendLbl.textContent = (currentSub || currentGroup) + ' attivo';
}

function updateMap() {
  d3.selectAll('.country')
    .attr('fill', function() { return isCountryActive(this.dataset.iso3) ? GROUPS[currentGroup].color : INACTIVE; })
    .classed('clickable', function() { return !!(COUNTRIES[this.dataset.iso3] || PAID_COUNTRIES[this.dataset.iso3]); });
}

function hasActiveCountriesForSub(sub) {
  var src = currentView === 'paid' ? PAID_COUNTRIES : COUNTRIES;
  return Object.values(src).some(function(c) {
    var gdata = c.active[currentGroup];
    if (!gdata) return false;
    if (currentView === 'paid') {
      var sdata = gdata.subs && gdata.subs[sub];
      return sdata && sdata.active;
    }
    return gdata.subs && gdata.subs[sub] === true;
  });
}

function updateSubBtns() {
  subFilters.querySelectorAll('.sub-btn').forEach(function(b) {
    const on = b.dataset.sub === currentSub;
    const hasSub = hasActiveCountriesForSub(b.dataset.sub);
    b.classList.toggle('active', on);
    if (on) { b.style.background = solidColor(currentGroup); b.style.borderColor = solidColor(currentGroup); b.style.color = '#fff'; }
    else if (hasSub) { b.style.background = ''; b.style.borderColor = solidColor(currentGroup); b.style.color = solidColor(currentGroup); }
    else { b.style.background = ''; b.style.borderColor = ''; b.style.color = ''; }
  });
}

function buildProdFilters(g, sub) {
  prodFilters.querySelectorAll('.prod-btn').forEach(function(b) { b.remove(); });
  currentProduct = null;
  if (!sub || !PRODUCTS[g] || !PRODUCTS[g][sub]) { prodFilters.classList.remove('visible'); return; }
  prodFilters.classList.add('visible');
  PRODUCTS[g][sub].forEach(function(p) {
    var btn = document.createElement('button');
    btn.className = 'prod-btn'; btn.textContent = p; btn.dataset.prod = p;
    var pushed = isProductPushed(p);
    if (pushed) { btn.style.borderColor = solidColor(g); btn.style.color = solidColor(g); }
    btn.addEventListener('click', function() {
      currentProduct = currentProduct === p ? null : p;
      updateProdBtns(); updateSubtitle(); updateMap();
    });
    prodFilters.appendChild(btn);
  });
  updateProdBtns();
}

function updateProdBtns() {
  prodFilters.querySelectorAll('.prod-btn').forEach(function(b) {
    const on = b.dataset.prod === currentProduct;
    const pushed = isProductPushed(b.dataset.prod);
    b.classList.toggle('active', on);
    if (on) { b.style.background = solidColor(currentGroup); b.style.borderColor = solidColor(currentGroup); b.style.color = '#fff'; }
    else if (pushed) { b.style.background = ''; b.style.borderColor = solidColor(currentGroup); b.style.color = solidColor(currentGroup); }
    else { b.style.background = ''; b.style.borderColor = ''; b.style.color = ''; }
  });
}

function buildSubFilters(g) {
  subFilters.querySelectorAll('.sub-btn').forEach(function(b) { b.remove(); });
  const subs = GROUPS[g].subs;
  if (!subs || subs.length === 0) { subFilters.classList.remove('visible'); return; }
  subFilters.classList.add('visible');
  subs.forEach(function(s) {
    const btn = document.createElement('button');
    btn.className = 'sub-btn'; btn.textContent = s; btn.dataset.sub = s;
    btn.addEventListener('click', function() {
      currentSub = currentSub === s ? null : s;
      buildProdFilters(currentGroup, currentSub);
      updateSubBtns(); updateSubtitle(); updateLegend(); updateMap();
    });
    subFilters.appendChild(btn);
  });
  updateSubBtns();
}

function setGroup(g) {
  currentGroup = g; currentSub = null; currentProduct = null;
  tabsEl.querySelectorAll('.tab-btn').forEach(function(b) {
    const on = b.dataset.group === g;
    b.classList.toggle('active', on);
    b.style.borderColor = on ? solidColor(g) : '';
    b.style.color = on ? solidColor(g) : '';
  });
  buildSubFilters(g); buildProdFilters(g, null); updateSubtitle(); updateLegend(); updateMap();
}

function setView(view) {
  currentView = view; currentSub = null; currentProduct = null; currentMonth = null;
  document.getElementById('btn-seo').classList.toggle('active', view === 'seo');
  document.getElementById('btn-paid').classList.toggle('active', view === 'paid');
  buildMonthFilters();
  buildSubFilters(currentGroup);
  buildProdFilters(currentGroup, null);
  updateSubtitle(); updateLegend(); updateMap();
}

// ── BUILD TABS ──
Object.keys(GROUPS).forEach(function(g) {
  const btn = document.createElement('button');
  btn.className = 'tab-btn'; btn.dataset.group = g;
  const dot = document.createElement('span'); dot.className = 'dot';
  if (GROUPS[g].dotPattern) { dot.style.cssText = 'background:repeating-linear-gradient(45deg,#bbb 0px,#bbb 1px,#e8e6e0 1px,#e8e6e0 3px);border:0.5px solid #999;'; }
  else { dot.style.background = GROUPS[g].dotBg; }
  btn.appendChild(dot); btn.appendChild(document.createTextNode(g));
  btn.addEventListener('click', function() { setGroup(g); });
  tabsEl.appendChild(btn);
});

// ── MAP INIT ──
const svg  = d3.select('#world-map');
const proj = d3.geoNaturalEarth1().scale(170).translate([500, 280]);
const path = d3.geoPath().projection(proj);

fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json')
  .then(function(r) { return r.json(); })
  .then(function(world) {
    const countries = topojson.feature(world, world.objects.countries);
    svg.selectAll('.country')
      .data(countries.features)
      .enter().append('path')
      .attr('class','country')
      .attr('d', path)
      .each(function(d) {
        var numId = parseInt(d.id, 10);
        var paddedId = numId ? String(numId).padStart(3,'0') : '';
        this.dataset.iso3 = ISO_MAP[paddedId] || '';
      })
      .on('mousemove', function(event) {
        const iso3 = this.dataset.iso3;
        const c = COUNTRIES[iso3] || PAID_COUNTRIES[iso3];
        if (!c) return;
        tooltipEl.style.display = 'block';
        tooltipEl.style.left = (event.clientX + 12) + 'px';
        tooltipEl.style.top  = (event.clientY - 28) + 'px';
        const rl = REGION_LABEL[iso3];
        tooltipEl.textContent = (rl ? rl.label : c.name) + ' — clicca per dettagli';
      })
      .on('mouseleave', function() { tooltipEl.style.display = 'none'; })
      .on('click', function() {
        const iso3 = this.dataset.iso3;
        if (COUNTRIES[iso3] || PAID_COUNTRIES[iso3]) openModal(iso3);
      });
    setGroup('Wood');
  });
